<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project - Halan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>
  <body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-5xl mx-auto px-6 py-12">
      <!-- Back Button -->
      <button
        class="flex items-center gap-2 mb-12 text-zinc-400 hover:text-white transition"
      >
        <i class="fas fa-arrow-left text-xl"></i>
        <a class="font-medium" href="{% url 'home_page' %}"
          >Back to Portfolio</a
        >
      </button>

      <div>
        <img
          src="https://picsum.photos/id/201/1200/700"
          alt="E-Commerce Platform"
          class="w-full rounded-3xl shadow-2xl"
        />
        <div class="flex justify-between items-center mt-10">
          <div>
            <span class="text-emerald-400 text-sm font-medium"
              >{{project.details}}
            </span>
            <h1 class="text-5xl font-bold mt-3">{{project.name}}</h1>
          </div>
          <div class="text-right">
            <p class="text-zinc-500">2025</p>
          </div>
        </div>
        <p class="text-zinc-300 text-lg mt-10 leading-relaxed">
          {{project.details}}
        </p>
        <div class="mt-12">
          <h3 class="text-emerald-400 font-medium mb-4">Technologies Used</h3>
          <div class="flex flex-wrap gap-3">
            {% for skill in skill %}
            <span class="bg-zinc-800 px-6 py-3 rounded-2xl text-sm"
              >
              <h3 class="font-bold text-white">{{ skill.name }}</h3>
              <p class="text-zinc-400">{{ skill.experience }}</p>
           </span>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
